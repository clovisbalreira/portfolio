<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redes Socias</title>
    <style>
        @charset "UTF-8";
        *{
            margin: 0px;
            padding: 0px;
            font-family: Arial, Helvetica, sans-serif;
        }
        html, body{
            height: 100vh;
            width: 100vw;
            background-color: black;
            /*background: url() no-repeat top center;
            background-color: cover;
            background-attachment: fixed;*/
        }
        main{
            height: 100vh;
            position: relative;
        }
        section#telefone{
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -25%);
            height: 627px;
            width: 311px;
            background-color: blue;
            /*background: blue url() no-repeat;*/
        }
        iframe#tela{
            position: relative;
            top: 80px;
            left: 22px;
            height: 471px;
            width: 269px;
        }
        section#redes-sociais{
            text-align: right;
        }


        section#redes-sociais img{
            width: 50px;
            margin: 10px;
            border-radius: 50%;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.400);
            box-sizing: border-box;
        }

        section#redes-sociais img:hover{
            border: 2px solid rgba(255, 255, 255, 0.637);
            transform: translate(-3px,-3px);
            box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.623);
            transition: transform .5s, border 1s;
        }

    </style>
</head>
<body>
    <main>
        <section id="telefone">
            <iframe src="home.html" name="tela" id="tela" frameborder="0">Seu navegador não é compativel</iframe>
        </section>
        <section id="redes-sociais">
            <a href=""><img src="" alt="Home"></a><br>
            <a href=""><img src="" alt="YouTube"></a><br>
            <a href=""><img src="" alt="GitHub"></a><br>
            <a href=""><img src="" alt="Instagram"></a><br>
            <a href=""><img src="" alt="Twitter"></a><br>
            <a href=""><img src="" alt="Facebook"></a><br>
        </section>
    </main>
</body>
</html>
