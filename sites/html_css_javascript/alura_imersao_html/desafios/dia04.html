<!--7 Days of Code - Lógica de Programação com Javascript

Dia 4
Exercício

Você já brincou de tentar adivinhar o número que seu amigo ou amiga estava pensando? Pois hoje você irá jogar esse joga contra o próprio computador!

Aqui está tudo o que você precisa fazer para o desafio de hoje:

Você deve criar um programinha que já inicialize com um valor específico entre 0-10 para o número que você irá adivinhar Em seguida, ele perguntará para você qual o valor que você deseja chutar e, caso você acerte, ele irá te parabenizar ou, caso erre, ele irá te dar mais 2 tentativas No fim, caso você não acerte nenhuma vez, ele irá imprimir qual era o número inicial
Dica

Pense muito bem em qual estrutura de repetição você irá utilizar para fazer o seu programa ser executado até o momento que as 3 tentativas acabarem ou a pessoa acertar o número

Lembre-se que você pode sempre personalizar o seu programinha da forma que quiser!
Extra

Você pode até incrementar o seu programa e fazer a própria máquina escolher sozinha o número a ser adivinhado, utilizando algo chamado Math.random(), que você pode conferir nesse site

Para aprender mais sobre estruturas de repetição, dê uma olhada nesse site

Aproveite para também estudar Javascript nos cursos da Alura


-->
